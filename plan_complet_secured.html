<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔒 Plan Immobilier — Accès sécurisé</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

.login-container {
    background: white;
    padding: 40px 32px;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    width: 100%;
    max-width: 400px;
    text-align: center;
}

.login-icon {
    font-size: 48px;
    margin-bottom: 16px;
}

.login-title {
    font-size: 22px;
    font-weight: 600;
    color: #1e293b;
    margin-bottom: 8px;
}

.login-subtitle {
    font-size: 14px;
    color: #64748b;
    margin-bottom: 24px;
}

.password-input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 16px;
}

.password-input:focus {
    border-color: #667eea;
}

.unlock-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
}

.unlock-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
}

.unlock-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.error-msg {
    color: #ef4444;
    font-size: 14px;
    margin-top: 12px;
    display: none;
}

.security-info {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #e2e8f0;
    font-size: 12px;
    color: #94a3b8;
    line-height: 1.5;
}

#content-container {
    display: none;
    width: 100%;
    height: 100vh;
}

#content-container iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.loader {
    display: none;
    width: 24px;
    height: 24px;
    border: 3px solid #e2e8f0;
    border-top: 3px solid #667eea;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div id="login-container" class="login-container">
    <div class="login-icon">🔒</div>
    <div class="login-title">Plan Immobilier — Accès sécurisé</div>
    <div class="login-subtitle">Mot de passe requis pour déchiffrer le plan</div>

    <input type="password" id="password" class="password-input" placeholder="Mot de passe..." autofocus>
    <button id="unlock-btn" class="unlock-btn" onclick="unlock()">🔓 Déverrouiller</button>

    <div class="loader" id="loader"></div>
    <div class="error-msg" id="error">❌ Mot de passe incorrect</div>

    <div class="security-info">
        🔐 Chiffrement AES-256-GCM + PBKDF2 (100 000 itérations)<br>
        Sans le mot de passe, le contenu est cryptographiquement inaccessible.
    </div>
</div>

<div id="content-container"></div>

// Iterations PBKDF2
const PBKDF2_ITERATIONS = 100000;

// Convert base64 to Uint8Array
function base64ToBytes(b64) {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
    }
    return bytes;
}

async function deriveKey(password, salt) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
    );

    return await crypto.subtle.deriveKey(
        {
            name: "PBKDF2",
            salt: salt,
            iterations: PBKDF2_ITERATIONS,
            hash: "SHA-256"
        },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
    );
}

async function decryptData(password) {
    try {
        const salt = base64ToBytes(ENCRYPTED_DATA.salt);
        const iv = base64ToBytes(ENCRYPTED_DATA.iv);
        const ciphertext = base64ToBytes(ENCRYPTED_DATA.ciphertext);

        const key = await deriveKey(password, salt);

        const plaintextBuffer = await crypto.subtle.decrypt(
            { name: "AES-GCM", iv: iv },
            key,
            ciphertext
        );

        // Décompression : le contenu est gzippé
        const compressed = new Uint8Array(plaintextBuffer);

        // Decompress using DecompressionStream (browser native)
        const ds = new DecompressionStream("gzip");
        const stream = new Blob([compressed]).stream().pipeThrough(ds);
        const decompressed = await new Response(stream).text();

        return decompressed;
    } catch (e) {
        return null;
    }
}

async function unlock() {
    const passwordInput = document.getElementById('password');
    const unlockBtn = document.getElementById('unlock-btn');
    const errorMsg = document.getElementById('error');
    const loader = document.getElementById('loader');

    const password = passwordInput.value.trim();
    if (!password) return;

    // UI : montrer loader
    unlockBtn.disabled = true;
    unlockBtn.style.display = 'none';
    loader.style.display = 'block';
    errorMsg.style.display = 'none';

    // Petit délai pour que l'UI réagisse (sinon le PBKDF2 bloque)
    await new Promise(resolve => setTimeout(resolve, 50));

    const decrypted = await decryptData(password);

    if (decrypted === null) {
        // Erreur : mauvais mot de passe
        unlockBtn.disabled = false;
        unlockBtn.style.display = 'block';
        loader.style.display = 'none';
        errorMsg.style.display = 'block';
        passwordInput.value = '';
        passwordInput.focus();

        // Sauvegarder mot de passe en mémoire pour pas le redemander si refresh par erreur
        // (option : commenter cette ligne pour sécurité maximale)
        // sessionStorage.setItem('attempted_password_hash', '...');
        return;
    }

    // Succès : afficher le contenu déchiffré dans un iframe
    document.getElementById('login-container').style.display = 'none';
    const container = document.getElementById('content-container');
    container.style.display = 'block';

    // Créer iframe avec sandbox pour isoler
    const iframe = document.createElement('iframe');
    iframe.srcdoc = decrypted;
    container.appendChild(iframe);

    // Optionnel : sauvegarder mot de passe en sessionStorage pour pas demander à chaque refresh
    sessionStorage.setItem('plan_unlocked', '1');
}

// Permettre Enter pour valider
document.getElementById('password').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') unlock();
});
</script>
