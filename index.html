<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }

body {
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
    background: #f5f5f5;
    color: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
}

.login-container {
    background: #ffffff;
    padding: 48px 40px;
    border: 1px solid #e5e5e5;
    border-radius: 4px;
    width: 100%;
    max-width: 420px;
}

.login-title {
    font-size: 20px;
    font-weight: 600;
    color: #111;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
}

.login-subtitle {
    font-size: 14px;
    color: #555;
    margin-bottom: 32px;
}

.password-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #333;
    margin-bottom: 8px;
}

.password-input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #ccc;
    background: #ffffff;
    color: #111;
    border-radius: 4px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 20px;
    font-family: inherit;
}

.password-input:focus {
    border-color: #1a1a1a;
}

.unlock-btn {
    width: 100%;
    padding: 12px 14px;
    background: #1a1a1a;
    color: #ffffff;
    border: none;
    border-radius: 4px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
}

.unlock-btn:hover {
    background: #000;
}

.unlock-btn:disabled {
    background: #999;
    cursor: not-allowed;
}

.error-msg {
    color: #b00020;
    font-size: 13px;
    margin-top: 12px;
    display: none;
}

.security-info {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid #e5e5e5;
    font-size: 12px;
    color: #666;
    line-height: 1.5;
}

.security-info strong {
    color: #333;
    font-weight: 500;
}

#content-container {
    display: none;
    width: 100%;
    height: 100vh;
}

#content-container iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.loader {
    display: none;
    width: 20px;
    height: 20px;
    border: 2px solid #e5e5e5;
    border-top: 2px solid #1a1a1a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 16px auto 0;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>

    <h1 class="login-title">Plan immobilier</h1>
    <p class="login-subtitle">Document protégé. Mot de passe requis pour accéder au contenu.</p>

    <label for="password" class="password-label">Mot de passe</label>
    <input type="password" id="password" class="password-input" placeholder="" autofocus autocomplete="current-password">
    <button id="unlock-btn" class="unlock-btn" onclick="unlock()">Accéder au document</button>

    <div class="loader" id="loader"></div>

</div>

// Iterations PBKDF2
const PBKDF2_ITERATIONS = 100000;

// Convert base64 to Uint8Array
function base64ToBytes(b64) {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
    }
    return bytes;
}

async function deriveKey(password, salt) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
    );

    return await crypto.subtle.deriveKey(
        {
            name: "PBKDF2",
            salt: salt,
            iterations: PBKDF2_ITERATIONS,
            hash: "SHA-256"
        },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
    );
}

async function decryptData(password) {
    try {
        const salt = base64ToBytes(ENCRYPTED_DATA.salt);
        const iv = base64ToBytes(ENCRYPTED_DATA.iv);
        const ciphertext = base64ToBytes(ENCRYPTED_DATA.ciphertext);

        const key = await deriveKey(password, salt);

        const plaintextBuffer = await crypto.subtle.decrypt(
            { name: "AES-GCM", iv: iv },
            key,
            ciphertext
        );

        // Décompression : le contenu est gzippé
        const compressed = new Uint8Array(plaintextBuffer);

        // Decompress using DecompressionStream (browser native)
        const ds = new DecompressionStream("gzip");
        const stream = new Blob([compressed]).stream().pipeThrough(ds);
        const decompressed = await new Response(stream).text();

        return decompressed;
    } catch (e) {
        return null;
    }
}

async function unlock() {
    const passwordInput = document.getElementById('password');
    const unlockBtn = document.getElementById('unlock-btn');
    const errorMsg = document.getElementById('error');
    const loader = document.getElementById('loader');

    const password = passwordInput.value.trim();
    if (!password) return;

    // UI : montrer loader
    unlockBtn.disabled = true;
    unlockBtn.style.display = 'none';
    loader.style.display = 'block';
    errorMsg.style.display = 'none';

    // Petit délai pour que l'UI réagisse (sinon le PBKDF2 bloque)
    await new Promise(resolve => setTimeout(resolve, 50));

    const decrypted = await decryptData(password);

    if (decrypted === null) {
        // Erreur : mauvais mot de passe
        unlockBtn.disabled = false;
        unlockBtn.style.display = 'block';
        loader.style.display = 'none';
        errorMsg.style.display = 'block';
        passwordInput.value = '';
        passwordInput.focus();

        // Sauvegarder mot de passe en mémoire pour pas le redemander si refresh par erreur
        // (option : commenter cette ligne pour sécurité maximale)
        // sessionStorage.setItem('attempted_password_hash', '...');
        return;
    }

    // Succès : afficher le contenu déchiffré dans un iframe
    document.getElementById('login-container').style.display = 'none';
    const container = document.getElementById('content-container');
    container.style.display = 'block';

    // Créer iframe avec sandbox pour isoler
    const iframe = document.createElement('iframe');
    iframe.srcdoc = decrypted;
    container.appendChild(iframe);

    // Optionnel : sauvegarder mot de passe en sessionStorage pour pas demander à chaque refresh
    sessionStorage.setItem('plan_unlocked', '1');
}

// Permettre Enter pour valider
document.getElementById('password').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') unlock();
});
</script>
