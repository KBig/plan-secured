// Iterations PBKDF2
const PBKDF2_ITERATIONS = 100000;

// Convert base64 to Uint8Array
function base64ToBytes(b64) {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
    }
    return bytes;
}

async function deriveKey(password, salt) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
    );

    return await crypto.subtle.deriveKey(
        {
            name: "PBKDF2",
            salt: salt,
            iterations: PBKDF2_ITERATIONS,
            hash: "SHA-256"
        },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
    );
}

async function decryptData(password) {
    try {
        const salt = base64ToBytes(ENCRYPTED_DATA.salt);
        const iv = base64ToBytes(ENCRYPTED_DATA.iv);
        const ciphertext = base64ToBytes(ENCRYPTED_DATA.ciphertext);

        const key = await deriveKey(password, salt);

        const plaintextBuffer = await crypto.subtle.decrypt(
            { name: "AES-GCM", iv: iv },
            key,
            ciphertext
        );

        // Décompression : le contenu est gzippé
        const compressed = new Uint8Array(plaintextBuffer);

        // Decompress using DecompressionStream (browser native)
        const ds = new DecompressionStream("gzip");
        const stream = new Blob([compressed]).stream().pipeThrough(ds);
        const decompressed = await new Response(stream).text();

        return decompressed;
    } catch (e) {
        return null;
    }
}

async function unlock() {
    const passwordInput = document.getElementById('password');
    const unlockBtn = document.getElementById('unlock-btn');
    const errorMsg = document.getElementById('error');
    const loader = document.getElementById('loader');

    const password = passwordInput.value.trim();
    if (!password) return;

    unlockBtn.disabled = true;
    unlockBtn.style.display = 'none';
    loader.style.display = 'block';
    errorMsg.style.display = 'none';

    await new Promise(resolve => setTimeout(resolve, 50));

    const decrypted = await decryptData(password);

    if (decrypted === null) {
        unlockBtn.disabled = false;
        unlockBtn.style.display = 'block';
        loader.style.display = 'none';
        errorMsg.style.display = 'block';
        passwordInput.value = '';
        passwordInput.focus();
        return;
    }

    // Sauvegarder le mot de passe :
    // - sessionStorage : pour la session courante (toujours)
    // - localStorage : pour partage entre onglets (Outils/Dashboard ouverts en target=_blank)
    //   et persistance après fermeture du navigateur. Sécurité : le device de l'user est son
    //   problème ; si quelqu'un a accès à Chrome déverrouillé, il peut déjà tout voir.
    try { sessionStorage.setItem('plan_password', password); } catch (e) {}
    try { localStorage.setItem('plan_password', password); } catch (e) {}

    // Remplacer COMPLÈTEMENT la page par le HTML déchiffré
    // (vs iframe qui cassait les liens anchor)
    document.open();
    document.write(decrypted);
    document.close();
}

document.getElementById('password').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') unlock();
});

// Auto-unlock silencieux si mot de passe deja sauvegardé
// Vérifier sessionStorage d'abord (priorité onglet courant), puis localStorage (autres onglets)
(async () => {
    try {
        const saved = sessionStorage.getItem('plan_password') || localStorage.getItem('plan_password');
        if (!saved) return;
        document.getElementById('login-container').style.opacity = '0.4';
        const decrypted = await decryptData(saved);
        if (decrypted !== null) {
            // Synchroniser les 2 stockages au cas où
            try { sessionStorage.setItem('plan_password', saved); } catch(e) {}
            try { localStorage.setItem('plan_password', saved); } catch(e) {}
            document.open();
            document.write(decrypted);
            document.close();
        } else {
            // Mot de passe invalide (peut-être changé) -> nettoyer pour forcer re-saisie
            sessionStorage.removeItem('plan_password');
            localStorage.removeItem('plan_password');
            document.getElementById('login-container').style.opacity = '1';
        }
    } catch (e) {}
})();
</script>
